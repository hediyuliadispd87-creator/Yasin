<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YouTube – Tonton Video</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:  #ff0000;
      --red2: #cc0000;
      --dark: #080808;
      --dark2: #111;
      --white: #ffffff;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--dark);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ══════════ LANDING ══════════ */
    #landing {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 10;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #landing.hidden { opacity: 0; transform: scale(1.05); pointer-events: none; }

    /* BG */
    .bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 30%, rgba(255,0,0,0.13) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 85% 75%, rgba(180,0,0,0.09) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 10% 70%, rgba(80,0,0,0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    /* scanlines */
    .scan {
      position: absolute; inset: 0;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(255,255,255,0.012) 3px, rgba(255,255,255,0.012) 4px
      );
      pointer-events: none;
    }

    /* particles */
    .particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .p {
      position: absolute; border-radius: 50%;
      animation: riseP linear infinite; opacity: 0;
    }
    @keyframes riseP {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(-5vh) scale(1.1); opacity: 0; }
    }

    /* CARD */
    .card {
      position: relative;
      background: linear-gradient(160deg, #1c1c1c 0%, #111 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 26px;
      padding: 0 0 36px;
      width: 92%; max-width: 410px;
      overflow: hidden;
      box-shadow:
        0 0 80px rgba(255,0,0,0.1),
        0 40px 80px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.06);
      animation: cardIn 0.75s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(50px) scale(0.88); }
      to   { opacity:1; transform: none; }
    }

    /* thumbnail hero */
    .thumb-hero {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      overflow: hidden;
    }
    .thumb-hero img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .card:hover .thumb-hero img { transform: scale(1.03); }

    /* dark gradient over thumbnail */
    .thumb-hero::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.1) 0%,
        rgba(0,0,0,0.55) 100%
      );
    }

    /* play button */
    .play-btn {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 2;
    }
    .play-circle {
      width: 64px; height: 64px;
      background: rgba(255,0,0,0.92);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 0 rgba(255,0,0,0.5);
      animation: ripple 2.2s ease-in-out infinite;
      transition: transform 0.2s;
      cursor: pointer;
    }
    .play-circle:hover { transform: scale(1.12); }
    @keyframes ripple {
      0%  { box-shadow: 0 0 0 0 rgba(255,0,0,0.5); }
      70% { box-shadow: 0 0 0 22px rgba(255,0,0,0); }
      100%{ box-shadow: 0 0 0 0 rgba(255,0,0,0); }
    }
    .play-circle svg { margin-left: 4px; }

    /* live / quality badge */
    .thumb-badges {
      position: absolute; bottom: 10px; left: 12px;
      display: flex; gap: 6px;
      z-index: 3;
    }
    .badge {
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    .badge-yt  { background: var(--red); color: #fff; }
    .badge-hd  { background: rgba(0,0,0,0.75); color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.2); }

    /* card body */
    .card-body { padding: 20px 24px 0; }

    /* yt logo row */
    .yt-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 12px;
    }
    .yt-pill {
      display: flex; align-items: center; gap: 6px;
      background: var(--red);
      padding: 5px 10px;
      border-radius: 6px;
    }
    .yt-pill svg { flex-shrink: 0; }
    .yt-pill-text {
      font-family: 'Anton', sans-serif;
      font-size: 0.85rem;
      color: #fff;
      letter-spacing: 1px;
    }
    .yt-sep { flex:1; height:1px; background: rgba(255,255,255,0.07); }
    .yt-views {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.3);
      font-weight: 600;
    }

    .video-title {
      font-size: 0.97rem;
      font-weight: 800;
      color: rgba(255,255,255,0.9);
      line-height: 1.45;
      margin-bottom: 8px;
    }
    .video-url {
      font-size: 0.73rem;
      color: rgba(255,255,255,0.28);
      margin-bottom: 24px;
      word-break: break-all;
    }

    /* CTA */
    .btn-tonton {
      position: relative;
      width: 100%;
      padding: 15px 20px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 800;
      font-size: 0.95rem;
      color: #fff;
      background: var(--red);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 4px 24px rgba(255,0,0,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-tonton:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(255,0,0,0.65);
    }
    .btn-tonton:active { transform: translateY(1px); }
    .btn-tonton::before {
      content:'';
      position: absolute; inset:0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transform: translateX(-100%);
      transition: transform 0.55s;
    }
    .btn-tonton:hover::before { transform: translateX(100%); }

    .btn-prog {
      position: absolute; bottom:0; left:0;
      height:3px; width:0;
      background: rgba(255,255,255,0.7);
      transition: width 0.8s ease;
    }
    .btn-tonton.loading .btn-prog { width: 100%; }

    .note {
      margin-top: 12px;
      text-align: center;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.18);
    }

    /* ══════════ WEBVIEW ══════════ */
    #wv-wrap {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      background: #000;
      z-index: 5;
    }
    #wv-wrap.visible { display: flex; }

    .wv-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px;
      background: #111;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      min-height: 50px;
      flex-shrink: 0;
    }
    .wv-btn {
      background: rgba(255,255,255,0.07);
      border: none; color: #fff;
      width: 36px; height: 36px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .wv-btn:hover { background: rgba(255,0,0,0.35); }

    .url-bar {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px;
      padding: 7px 14px;
      color: rgba(255,255,255,0.45);
      font-size: 0.77rem;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .wv-yt-badge {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px;
      background: var(--red);
      border-radius: 20px;
      flex-shrink: 0;
    }
    .wv-yt-badge span { font-size: 0.72rem; font-weight: 800; color: #fff; }

    .wv-prog {
      height: 2px; width: 0;
      background: var(--red);
      box-shadow: 0 0 8px rgba(255,0,0,0.8);
      transition: width 0.4s ease;
      flex-shrink: 0;
    }

    .wv-frame-area { flex:1; position: relative; overflow: hidden; }

    .wv-loader {
      position: absolute; inset: 0;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px; z-index: 10;
      transition: opacity 0.5s;
    }
    .wv-loader.done { opacity: 0; pointer-events: none; }

    .yt-logo-big {
      width: 72px; height: 52px;
      background: var(--red);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px rgba(255,0,0,0.6);
      animation: ytPop 1.8s ease-in-out infinite;
    }
    @keyframes ytPop {
      0%,100% { transform: scale(1); box-shadow: 0 0 30px rgba(255,0,0,0.5); }
      50%      { transform: scale(1.06); box-shadow: 0 0 50px rgba(255,0,0,0.85); }
    }
    .yt-logo-big::after {
      content:'';
      border-style: solid;
      border-width: 12px 0 12px 24px;
      border-color: transparent transparent transparent #fff;
      margin-left: 5px;
    }

    .yt-spin {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.07);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .wv-load-txt {
      font-size: 0.82rem; font-weight: 600;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.5px;
    }

    #yt-frame {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<!-- ══ LANDING ══ -->
<div id="landing">
  <div class="bg"></div>
  <div class="scan"></div>
  <div class="particles" id="pts"></div>

  <div class="card">
    <!-- thumbnail hero -->
    <div class="thumb-hero">
      <img
        id="thumbImg"
        src="https://img.youtube.com/vi/od0zuvIJC5k/maxresdefault.jpg"
        alt="Thumbnail"
        onerror="this.src='https://img.youtube.com/vi/od0zuvIJC5k/hqdefault.jpg'"
      />
      <div class="play-btn">
        <div class="play-circle" onclick="masuk()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <div class="thumb-badges">
        <span class="badge badge-yt">▶ YouTube</span>
        <span class="badge badge-hd">HD</span>
      </div>
    </div>

    <!-- body -->
    <div class="card-body">
      <div class="yt-row">
        <div class="yt-pill">
          <svg width="14" height="10" viewBox="0 0 24 17" fill="white"><path d="M23.5 2.5S23.2.7 22.4 0c-.9-1-1.9-1-2.4-1C16.7-1 12-1 12-1s-4.7 0-8 .9c-.5.1-1.5.5-2.4 1C.8.7.5 2.5.5 2.5S.2 4.6.2 6.7v2c0 2.1.3 4.2.3 4.2s.3 1.8 1.1 2.5c.9 1 2 .9 2.6 1C6.1 16.7 12 17 12 17s4.7 0 8-.9c.5-.1 1.5-.5 2.4-1 .8-.7 1.1-2.5 1.1-2.5s.3-2.1.3-4.2v-2c0-2.1-.3-4.2-.3-4.2z"/><polygon points="9.5,12 9.5,5 16,8.5" fill="#ff0000"/></svg>
          <span class="yt-pill-text">YOUTUBE</span>
        </div>
        <div class="yt-sep"></div>
        <span class="yt-views">youtu.be/od0zuvIJC5k</span>
      </div>

      <p class="video-title">Tonton Video Pilihan di YouTube</p>
      <p class="video-url">https://youtu.be/od0zuvIJC5k?si=BKdOXBuJOMdJcfcu</p>

      <button class="btn-tonton" id="btnMasuk" onclick="masuk()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        Putar Video
        <div class="btn-prog" id="btnProg"></div>
      </button>
      <p class="note">Video diputar dalam pemutar YouTube resmi</p>
    </div>
  </div>
</div>

<!-- ══ WEBVIEW ══ -->
<div id="wv-wrap">
  <div class="wv-bar">
    <button class="wv-btn" onclick="kembali()">←</button>
    <div class="url-bar">youtube.com/watch?v=od0zuvIJC5k</div>
    <div class="wv-yt-badge">
      <svg width="14" height="10" viewBox="0 0 24 17" fill="white"><path d="M23.5 2.5S23.2.7 22.4 0c-.9-1-1.9-1-2.4-1C16.7-1 12-1 12-1s-4.7 0-8 .9c-.5.1-1.5.5-2.4 1C.8.7.5 2.5.5 2.5S.2 4.6.2 6.7v2c0 2.1.3 4.2.3 4.2s.3 1.8 1.1 2.5c.9 1 2 .9 2.6 1C6.1 16.7 12 17 12 17s4.7 0 8-.9c.5-.1 1.5-.5 2.4-1 .8-.7 1.1-2.5 1.1-2.5s.3-2.1.3-4.2v-2c0-2.1-.3-4.2-.3-4.2z"/></svg>
      <span>YouTube</span>
    </div>
    <button class="wv-btn" onclick="reloadFrame()">↻</button>
  </div>
  <div class="wv-prog" id="wvProg"></div>
  <div class="wv-frame-area">
    <div class="wv-loader" id="wvLoader">
      <div class="yt-logo-big"></div>
      <div class="yt-spin"></div>
      <div class="wv-load-txt">Memuat video…</div>
    </div>
    <iframe
      id="yt-frame"
      src="about:blank"
      allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
      allowfullscreen
      title="YouTube Video"
    ></iframe>
  </div>
</div>

<script>
  // particles
  const pc = document.getElementById('pts');
  for (let i = 0; i < 24; i++) {
    const el = document.createElement('div');
    el.className = 'p';
    const s = 3 + Math.random() * 5;
    el.style.cssText = `
      width:${s}px; height:${s}px;
      left:${Math.random()*100}%;
      background:${Math.random()>.5 ? 'rgba(255,0,0,0.55)' : 'rgba(255,255,255,0.18)'};
      animation-duration:${7+Math.random()*11}s;
      animation-delay:${Math.random()*11}s;
    `;
    pc.appendChild(el);
  }

  const VID = 'od0zuvIJC5k';
  const EMBED = `https://www.youtube.com/embed/${VID}?autoplay=1&rel=0&modestbranding=1`;

  function masuk() {
    const btn = document.getElementById('btnMasuk');
    btn.classList.add('loading');
    btn.style.pointerEvents = 'none';

    setTimeout(() => {
      document.getElementById('landing').classList.add('hidden');
      setTimeout(() => {
        const wrap   = document.getElementById('wv-wrap');
        const frame  = document.getElementById('yt-frame');
        const loader = document.getElementById('wvLoader');
        const prog   = document.getElementById('wvProg');

        wrap.classList.add('visible');
        prog.style.width = '50%';
        setTimeout(() => prog.style.width = '85%', 500);

        frame.src = EMBED;
        frame.onload = () => {
          prog.style.width = '100%';
          setTimeout(() => {
            prog.style.opacity = '0';
            loader.classList.add('done');
          }, 300);
        };
      }, 380);
    }, 850);
  }

  function kembali() {
    const frame  = document.getElementById('yt-frame');
    const loader = document.getElementById('wvLoader');
    const prog   = document.getElementById('wvProg');
    const btn    = document.getElementById('btnMasuk');

    document.getElementById('wv-wrap').classList.remove('visible');
    document.getElementById('landing').classList.remove('hidden');

    frame.src = 'about:blank';
    loader.classList.remove('done');
    prog.style.width = '0';
    prog.style.opacity = '1';
    btn.classList.remove('loading');
    btn.style.pointerEvents = '';
  }

  function reloadFrame() {
    const frame  = document.getElementById('yt-frame');
    const loader = document.getElementById('wvLoader');
    const prog   = document.getElementById('wvProg');

    loader.classList.remove('done');
    prog.style.opacity = '1';
    prog.style.width = '40%';
    frame.src = EMBED;
    frame.onload = () => {
      prog.style.width = '100%';
      setTimeout(() => {
        prog.style.opacity = '0';
        loader.classList.add('done');
      }, 300);
    };
  }
</script>
</body>
            </html>
